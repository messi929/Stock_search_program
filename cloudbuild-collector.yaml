steps:
  # 1) Docker 이미지 빌드 (Dockerfile.collector 사용)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.collector',
           '-t', 'gcr.io/$PROJECT_ID/stock-collector', '.']

  # 2) Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stock-collector']

  # 3) Cloud Run Job 생성/업데이트 — heavy, light-kr, light-us
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        REGION="asia-northeast3"
        IMAGE="gcr.io/$PROJECT_ID/stock-collector"
        CLOUD_URL="https://stock-screener-119320994983.$${REGION}.run.app"
        SECRETS="FIREBASE_CREDENTIALS=firebase-key:latest,ADMIN_KEY=admin-key:latest"
        SECRETS_LIGHT="FIREBASE_CREDENTIALS=firebase-key:latest,ADMIN_KEY=admin-key:latest"

        deploy_job() {
          local NAME=$$1 MEM=$$2 TIMEOUT=$$3 SEC=$$4 JOB_ARGS=$$5
          echo "=== Job: $${NAME} ==="
          if gcloud run jobs describe "$${NAME}" --region="$${REGION}" --quiet 2>/dev/null; then
            gcloud run jobs update "$${NAME}" \
              --region="$${REGION}" --image="$${IMAGE}" \
              --memory="$${MEM}" --cpu=1 \
              --task-timeout="$${TIMEOUT}" --max-retries=1 \
              --set-env-vars="CLOUD_RUN_URL=$${CLOUD_URL}" \
              --set-secrets="$${SEC}" \
              --args="$${JOB_ARGS}" --quiet
            echo "  ✓ updated"
          else
            gcloud run jobs create "$${NAME}" \
              --region="$${REGION}" --image="$${IMAGE}" \
              --memory="$${MEM}" --cpu=1 \
              --task-timeout="$${TIMEOUT}" --max-retries=1 \
              --set-env-vars="CLOUD_RUN_URL=$${CLOUD_URL}" \
              --set-secrets="$${SEC}" \
              --args="$${JOB_ARGS}" --quiet
            echo "  ✓ created"
          fi
        }

        deploy_job "collector-heavy"    "2Gi" "2400" "$${SECRETS}"       "--all"
        deploy_job "collector-light-kr"  "1Gi" "300" "$${SECRETS_LIGHT}" "--kr-snapshot,--etf"
        deploy_job "collector-light-us"  "1Gi" "300" "$${SECRETS_LIGHT}" "--us-snapshot"

        echo "=== 모든 Job 배포 완료 ==="

images:
  - 'gcr.io/$PROJECT_ID/stock-collector'
