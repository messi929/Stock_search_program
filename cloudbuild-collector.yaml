steps:
  # Docker 이미지 빌드 (Dockerfile.collector 사용)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.collector',
           '-t', 'gcr.io/$PROJECT_ID/stock-collector', '.']

  # Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/stock-collector']

  # Cloud Run Job 생성/업데이트 — heavy 수집용
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'create'
      - 'collector-heavy'
      - '--image'
      - 'gcr.io/$PROJECT_ID/stock-collector'
      - '--region'
      - 'asia-northeast3'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--task-timeout'
      - '900'
      - '--max-retries'
      - '1'
      - '--set-env-vars'
      - 'CLOUD_RUN_URL=https://stock-screener-119320994983.asia-northeast3.run.app'
      - '--set-secrets'
      - 'FIREBASE_CREDENTIALS=firebase-credentials:latest,ADMIN_KEY=admin-key:latest,TELEGRAM_BOT_TOKEN=telegram-bot-token:latest,TELEGRAM_CHAT_ID=telegram-chat-id:latest'
      - '--args'
      - '--all'

  # Cloud Run Job — KR 경량 수집용
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'create'
      - 'collector-light-kr'
      - '--image'
      - 'gcr.io/$PROJECT_ID/stock-collector'
      - '--region'
      - 'asia-northeast3'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--task-timeout'
      - '300'
      - '--max-retries'
      - '1'
      - '--set-env-vars'
      - 'CLOUD_RUN_URL=https://stock-screener-119320994983.asia-northeast3.run.app'
      - '--set-secrets'
      - 'FIREBASE_CREDENTIALS=firebase-credentials:latest,ADMIN_KEY=admin-key:latest'
      - '--args'
      - '--kr-snapshot,--etf'

  # Cloud Run Job — US 경량 수집용
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'create'
      - 'collector-light-us'
      - '--image'
      - 'gcr.io/$PROJECT_ID/stock-collector'
      - '--region'
      - 'asia-northeast3'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--task-timeout'
      - '300'
      - '--max-retries'
      - '1'
      - '--set-env-vars'
      - 'CLOUD_RUN_URL=https://stock-screener-119320994983.asia-northeast3.run.app'
      - '--set-secrets'
      - 'FIREBASE_CREDENTIALS=firebase-credentials:latest,ADMIN_KEY=admin-key:latest'
      - '--args'
      - '--us-snapshot'

images:
  - 'gcr.io/$PROJECT_ID/stock-collector'
